<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon | Aden Beauty</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="../images/logo_aden_gold2.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --brand-gold: #c5a059;
            --brand-brown: #514136;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fdfbf7;
            color: var(--brand-brown);
        }
        h1, h2 {
            font-family: 'Playfair Display', serif;
        }
        .bg-pattern {
            background-image: radial-gradient(#514136 0.5px, transparent 0.5px);
            background-size: 24px 24px;
            opacity: 0.1;
        }
        .reveal-text {
            animation: reveal 1.5s cubic-bezier(0.77, 0, 0.175, 1) forwards;
        }
        @keyframes reveal {
            0% { transform: translateY(30px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }
        .divider {
            width: 60px;
            height: 1px;
            background-color: var(--brand-gold);
            margin: 2rem auto;
        }
        
        /* Gaya Tombol Custom */
        .btn-back {
            border: 1px solid var(--brand-brown);
            transition: all 0.4s ease;
        }
        .btn-back:hover {
            background-color: var(--brand-brown);
            color: white;
            letter-spacing: 0.2em;
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-center items-center relative overflow-hidden">
    
    <div class="absolute inset-0 bg-pattern"></div>

    <div class="absolute -top-24 -right-24 w-96 h-96 rounded-full border border-[#cfa395]/20"></div>
    <div class="absolute -bottom-24 -left-24 w-64 h-64 rounded-full border border-[#cfa395]/10"></div>

    <div class="relative z-10 px-6 text-center max-w-3xl">
        <div class="mb-4 reveal-text">
            <img src="../images/logo_loading_aden_beauty.png" alt="Aden Logo" class="h-12 mx-auto mb-4">
            <p class="text-[10px] tracking-[0.2em] uppercase font-semibold text-[#cfa395]">Show Your Beauty</p>
        </div>

        <h1 class="text-4xl md:text-6xl font-normal leading-tight mb-4 reveal-text" style="animation-delay: 0.2s;">
            <span class="font-light">Coming Soon.</span>
        </h1>

        <p class="text-stone-500 text-sm md:text-base max-w-lg mx-auto mb-10 leading-relaxed reveal-text" style="animation-delay: 0.5s;">
            Akan segera hadir untuk DenAyu, sebuah rancangan untuk memberikan pengalaman berbelanja yang mudah, nyaman, aman dan terupdate.
        </p>

        <div class="reveal-text" style="animation-delay: 0.7s;">
    <a href="../index.html" 
       class="inline-block px-10 py-3.5 text-[10px] font-bold uppercase tracking-[0.2em] transition-all border border-[#cfa395] text-[#cfa395] hover:bg-[#cfa395] hover:text-white rounded-sm">
        Back To Home
    </a>
</div>

    </div>
</body>
</html>
