<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aden Group Official | Virtual Account Billing</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="icon" href="images/logo_aden_gold2.png" type="image/png">
    <style>body { font-family: 'Plus Jakarta Sans', sans-serif; }</style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white w-full max-w-md rounded-xl shadow-xl overflow-hidden border border-gray-200">
        
        <div class="py-4 px-6 text-center border-b border-gray-100 bg-white">
            <div id="bank-logo-container" class="flex justify-center mb-2"></div>
            <h2 id="billing-title" class="text-[9px] font-black uppercase tracking-[0.2em] text-gray-400 mb-0.5">Virtual Account Billing</h2>
            <p id="bank-name-display" class="text-sm font-black text-gray-800 uppercase tracking-tighter">Bank Transfer</p>
        </div>

        <div class="flex justify-center mt-3">
            <div class="flex items-center gap-2 bg-red-50 px-3 py-1 rounded-full border border-red-100">
                <span class="text-[12px] text-red-800 font-black uppercase">Pay within:</span>
                <span id="countdown" class="text-[12px] text-red-600 font-black tabular-nums">00:60:00</span>
            </div>
        </div>

        <div class="p-5 space-y-4">
            
            <div class="text-center">
                <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mb-0.5">Total Amount to Pay</p>
                <h3 class="text-xl font-black text-gray-900 tracking-tight">Rp <span id="va-total">0</span></h3>
                <div id="copy-toast" class="fixed left-1/2 -translate-x-1/2 bg-gray-500 text-white text-[10px] font-bold uppercase tracking-widest px-6 py-3 rounded-full shadow-2xl opacity-0 transition-all duration-300 pointer-events-none z-[9999]">
            Code Berhasil Disalin!
            </div>
            </div>



            <div id="payment-code-container" class="bg-gray-50 rounded-xl p-4 border border-gray-100 relative text-center">
                </div>

            <div class="space-y-2">
                <h4 class="text-[9px] font-black text-gray-800 uppercase tracking-[0.15em]">Payment Instructions</h4>
                <div id="instructions-list" class="space-y-1.5">
                    </div>
            </div>
        </div>

        <div class="p-4 bg-gray-50 border-t border-gray-100 flex flex-col gap-2">
            <button onclick="window.location.href='success.html'" class="w-full py-3 bg-green-600 text-white rounded-lg font-black text-[11px] uppercase tracking-widest hover:bg-green-700 transition-all shadow-md shadow-green-100">
                CONFIRM
            </button>
            <button onclick="window.history.back()" class="w-full py-1.5 text-gray-400 font-bold text-[10px] uppercase tracking-widest hover:text-gray-600 transition-colors">
                Change Payment Method
            </button>
        </div>
    </div>
</body>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const orderData = JSON.parse(localStorage.getItem('lastOrder'));
            if (!orderData) { window.location.href = 'index.html'; return; }

            const method = orderData.paymentMethod;
            const total = orderData.total;
            const invoice = orderData.invoice || 'INV-' + Date.now();

            const bankDisplay = document.getElementById('bank-name-display');
            const logoContainer = document.getElementById('bank-logo-container');
            const billingTitle = document.getElementById('billing-title');
            const paymentCodeContainer = document.getElementById('payment-code-container');
            const instructionsList = document.getElementById('instructions-list');
            
            document.getElementById('va-total').innerText = total.toLocaleString('id-ID');

            if (method === 'QRIS') {
                // Konfigurasi Tampilan QRIS
                billingTitle.innerText = "Instant Payment QRIS";
                bankDisplay.innerText = "Scan QR Code";
                logoContainer.innerHTML = `<div class="bg-gradient-to-tr from-pink-500 to-purple-600 px-3 py-1 rounded text-[10px] text-white font-black italic">QRIS</div>`;

                // Tampilkan QR Code (Simulasi menggunakan API QR gratis)
                const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${invoice}`;
                paymentCodeContainer.innerHTML = `
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-4 text-left">QRIS Scan Code</p>
                    <div class="bg-white p-3 inline-block rounded-xl border border-gray-200 shadow-sm">
                        <img src="${qrUrl}" alt="QRIS Code" class="w-48 h-48 mx-auto">
                    </div>
                    <p class="text-[9px] text-gray-400 mt-4 uppercase font-bold italic">Support: GoPay, OVO, ShopeePay, Dana, LinkAja</p>
                `;

                // Instruksi QRIS
                instructionsList.innerHTML = `
                    <div class="flex gap-4 items-start">
                        <span class="w-5 h-5 rounded-full bg-stone-100 text-[10px] flex items-center justify-center font-bold shrink-0">1</span>
                        <p class="text-[12px] text-gray-500 leading-relaxed">Simpan atau Screenshot gambar QR Code di atas.</p>
                    </div>
                    <div class="flex gap-4 items-start">
                        <span class="w-5 h-5 rounded-full bg-stone-100 text-[10px] flex items-center justify-center font-bold shrink-0">2</span>
                        <p class="text-[12px] text-gray-500 leading-relaxed">Buka aplikasi E-Wallet atau Mobile Banking pilihan Anda.</p>
                    </div>
                    <div class="flex gap-4 items-start">
                        <span class="w-5 h-5 rounded-full bg-stone-100 text-[10px] flex items-center justify-center font-bold shrink-0">3</span>
                        <p class="text-[12px] text-gray-500 leading-relaxed">Pilih menu <strong class="text-gray-700">Scan / Bayar</strong> lalu unggah gambar QR Code tadi.</p>
                    </div>
                `;

            } else {
                // Konfigurasi Tampilan Bank (VA)
                const bankConfigs = {
                    'BNI': { name: 'BNI Virtual Account', prefix: '8806', logo: 'https://i.pinimg.com/736x/ef/33/52/ef3352ee1f22a05508f2aa618bac5642.jpg' },
                    'BRI': { name: 'BRI Virtual Account', prefix: '128', logo: 'https://upload.wikimedia.org/wikipedia/commons/thumb/6/61/Bendera_BRI_2025_%28Putih%29.svg/960px-Bendera_BRI_2025_%28Putih%29.svg.png?_=20251221004429' },
                    'MANDIRI': { name: 'Mandiri Virtual Account', prefix: '89022', logo: 'https://www.bankmandiri.co.id/documents/20143/44881086/ag-branding-logo-1.png/842d8cf8-b7fb-3014-9620-21f0f88d8377?t=1623309819034' },
                    'BSI': { name: 'BSI Virtual Account', prefix: '900', logo: 'https://ridergalau.id/wp-content/uploads/2025/12/Logo-Bank-BSI-768x576.png' }
                };

                const config = bankConfigs[method] || bankConfigs['BNI'];
                bankDisplay.innerText = config.name;
                logoContainer.innerHTML = `<img src="${config.logo}" class="h-8 object-contain">`;
                
                const vaNumber = config.prefix + Math.floor(1000000000 + Math.random() * 9000000000);

                paymentCodeContainer.innerHTML = `
                    <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-3 text-left">Virtual Account Number</p>
                    <div class="flex justify-between items-center">
                        <span id="va-num" class="text-xl font-black text-stone-800 tracking-widest">${vaNumber}</span>
                        <button onclick="copyText('${vaNumber}')" class="text-[10px] font-bold bg-stone-600 text-white px-3 py-1.5 rounded-lg hover:bg-stone-700 transition-all uppercase">Copy</button>
                    </div>
                `;

                // Instruksi VA
                instructionsList.innerHTML = `
                    <div class="flex gap-4 items-start">
                        <span class="w-5 h-5 rounded-full bg-stone-100 text-[10px] flex items-center justify-center font-bold shrink-0">1</span>
                        <p class="text-[12px] text-gray-500 leading-relaxed">Buka aplikasi Mobile Banking dan pilih menu <strong class="text-gray-700">Transfer</strong>.</p>
                    </div>
                    <div class="flex gap-4 items-start">
                        <span class="w-5 h-5 rounded-full bg-stone-100 text-[10px] flex items-center justify-center font-bold shrink-0">2</span>
                        <p class="text-[12px] text-gray-500 leading-relaxed">Pilih <strong class="text-gray-700">Virtual Account</strong> dan masukkan nomor di atas.</p>
                    </div>
                `;
            }

            // --- LOGIKA HITUNG MUNDUR SYNC ---
const countdownElement = document.getElementById('countdown');
// Ambil waktu kedaluwarsa yang sudah dibuat di halaman sebelumnya
let expiryTime = localStorage.getItem('paymentExpiry');

if (expiryTime) {
    const updateTimer = setInterval(() => {
        const now = new Date().getTime();
        const distance = expiryTime - now;

        // Jika waktu habis
        if (distance <= 0) {
            clearInterval(updateTimer);
            if(countdownElement) countdownElement.innerText = "00:00:00";
            localStorage.removeItem('paymentExpiry');
            localStorage.removeItem('activeInvoice');
            alert("Waktu pembayaran telah habis.");
            window.location.href = 'index.html'; // Kembali ke awal
            return;
        }

        // Hitung jam, menit, detik
        const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((distance / (1000 * 60)) % 60);
        const seconds = Math.floor((distance / 1000) % 60);

        // Update tampilan (pastikan ID 'countdown' ada di HTML)
        if(countdownElement) {
            countdownElement.innerText = 
                `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }
    }, 1000);
}

        });

        function copyText(text) {
    // Proses Salin ke Clipboard
    navigator.clipboard.writeText(text).then(() => {
        const toast = document.getElementById('copy-toast');
        
        // Munculkan Pop-up
        toast.classList.remove('opacity-0', 'translate-y-4');
        toast.classList.add('opacity-100', '-translate-y-2');

        // Hilangkan Pop-up setelah 2 detik
        setTimeout(() => {
            toast.classList.remove('opacity-100', '-translate-y-2');
            toast.classList.add('opacity-0', 'translate-y-4');
        }, 2000);
    });
}
    </script>
</body>
</html>
