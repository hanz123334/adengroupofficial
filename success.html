<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aden Group Official | Payment Success</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="icon" href="images/logo_aden_gold2.png" type="image/png">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        @media print {
            /* 1. Sembunyikan elemen non-invoice */
            .no-print { display: none !important; }
            
            /* 2. Pengaturan Kertas */
            @page {
                size: A4;
                margin: 0.5cm;
            }

            body {
                background-color: white !important;
                padding: 0 !important;
                margin: 0 !important;
            }

            /* 3. Maksa Layout 2 Kolom (Address ke Kanan) */
            .grid-cols-print {
                display: grid !important;
                grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
                gap: 2rem !important;
            }

            /* 4. Perkecil Container & Font */
            .max-w-2xl {
                max-width: 100% !important;
                width: 100% !important;
                padding: 0 !important;
                margin: 0 !important;
            }

            .bg-white {
                border: 1px solid #e5e7eb !important; /* border-stone-200 */
                box-shadow: none !important;
            }

            /* Kurangi padding berlebih */
            .p-6 { padding: 0.75rem !important; }
            .p-8 { padding: 1rem !important; }
            .py-12 { padding-top: 0 !important; }
            .mb-10 { margin-bottom: 1rem !important; }

            /* Skala Font */
            h1 { font-size: 16px !important; }
            h3 { font-size: 9px !important; margin-bottom: 4px !important; }
            p, span, h4 { font-size: 10px !important; }
            #display-total { font-size: 16px !important; }

            /* Kecilkan Gambar Produk */
            .w-14.h-15 {
                width: 35px !important;
                height: 40px !important;
            }

            /* Rapatkan jarak antar item order */
            .space-y-4 > * + * { margin-top: 0.4rem !important; }
            .py-3 { padding-top: 0.2rem !important; padding-bottom: 0.2rem !important; }
        }
    </style>
</head>
<body class="bg-stone-50 pb-20">

<div class="max-w-2xl mx-auto px-6 py-12">
    <div class="text-center mb-10 no-print">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-green-100 rounded-full mb-4">
            <svg class="w-8 h-8 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>
        <h1 class="text-xl font-extrabold text-stone-800 uppercase tracking-[0.2em]">Payment Successful</h1>
        <p class="text-stone-500 text-[11px] font-semibold mt-2 uppercase tracking-widest">Thank you, we have received your order.</p>
    </div>

    <div class="bg-white border border-stone-200 rounded-2xl overflow-hidden shadow-xl shadow-stone-200/50">
        
        <div class="p-6 border-b border-stone-100 bg-stone-50/50 flex justify-between items-center">
            <div>
                <p class="text-[9px] text-stone-400 uppercase font-black tracking-widest">Order ID (Invoice)</p>
                <p id="display-invoice" class="text-sm font-bold text-stone-800 tracking-tight mt-0.5">INV/---</p>
            </div>
            <div class="text-right">
                <p class="text-[9px] text-stone-400 uppercase font-black tracking-widest">Receipt Number</p>
                <p id="resi-number" class="text-sm font-bold text-stone-600 tracking-tight mt-0.5 uppercase">---</p>
            </div>
        </div>

        <div class="p-8 grid md:grid-cols-2 grid-cols-print gap-8 border-b border-stone-100">
            <div>
                <h3 class="text-[10px] font-black uppercase tracking-widest text-stone-400 mb-2">Delivery Informations</h3>
                <div class="space-y-1">
                    <p id="customer-name" class="text-xs font-bold text-stone-800 uppercase">-</p>
                    <p id="customer-email" class="text-[12px] text-stone-600 font-semibold break-all">-</p>
                    <p id="customer-phone" class="text-[12px] text-stone-600 font-semibold">-</p>
                </div>
            </div>
            <div>
                <h3 class="text-[10px] font-black uppercase tracking-widest text-stone-400 mb-2">Shipping Address</h3>
                <p id="shipping-address" class="text-[12px] text-stone-600 leading-relaxed font-semibold capitalize">-</p>
            </div>
        </div>

        <div class="p-8">
            <h3 class="text-[10px] font-black uppercase tracking-widest text-stone-400 mb-4">Order Summary</h3>
            <div id="order-items" class="space-y-4">
                </div>

            <div class="mt-8 pt-6 border-t border-stone-100 space-y-2">
                <div class="flex justify-between text-[11px] font-bold">
                    <span class="text-stone-400 uppercase tracking-widest">Subtotal</span>
                    <span id="display-subtotal" class="text-stone-800">Rp 0</span>
                </div>
                <div class="flex justify-between text-[11px] font-bold">
                    <span class="text-stone-400 uppercase tracking-widest">Shipping (<span id="display-courier">-</span>)</span>
                    <span id="display-shipping-cost" class="text-stone-800">Rp 0</span>
                </div>
                <div class="flex justify-between items-center pt-4 border-t border-stone-200">
                    <span class="text-xs font-black text-stone-800 uppercase tracking-widest">Total payment</span>
                    <span id="display-total" class="text-lg font-extrabold text-stone-800 tracking-tighter">Rp 0</span>
                </div>
            </div>
        </div>

        <div class="px-8 py-4 bg-stone-50 border-t border-stone-100 text-center">
            <p class="text-[9px] text-stone-400 font-bold uppercase tracking-[0.2em]">Aden Group Official</p>
        </div>
    </div>

    <div class="mt-8 flex flex-col gap-3 no-print">
        <button onclick="window.print()" class="w-full bg-white border border-stone-200 text-stone-800 py-4 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-stone-50 transition-all flex items-center justify-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Download invoice (PDF)
        </button>
        <button onclick="clearAndGoHome()" class="w-full bg-[#514136] text-white py-4 rounded-xl text-[10px] font-black uppercase tracking-widest hover:opacity-90 transition-all shadow-lg shadow-stone-200">
            Back To Home
        </button>
    </div>
</div>

<script>
function renderReceipt() {
    const orderData = JSON.parse(localStorage.getItem('lastOrder'));
    if (!orderData) {
        window.location.href = 'index.html';
        return;
    }

    // --- BAGIAN UPDATE: PENYIMPANAN HISTORY ---
    let orderHistory = JSON.parse(localStorage.getItem('orderHistory')) || [];
    
    // Cek agar tidak duplikat (misal user refresh halaman success)
    const isAlreadyStored = orderHistory.some(order => order.invoice === orderData.invoice);

    if (!isAlreadyStored) {
        // Tambahkan tanggal transaksi jika belum ada
        orderData.date = new Date().toLocaleString('id-ID', {
            day: '2-digit',
            month: 'long',
            year: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
        });
        
        orderHistory.unshift(orderData); // Masukkan ke urutan paling atas
        localStorage.setItem('orderHistory', JSON.stringify(orderHistory));
    }

    // Bersihkan keranjang karena pembayaran sudah sukses
    localStorage.removeItem('myCart');
    window.dispatchEvent(new Event('storage'));

    // --- RENDER KE TAMPILAN INVOICE ---
    document.getElementById('display-invoice').innerText = orderData.invoice || 'INV/' + Date.now();
    
    // Gunakan Resi yang konsisten (simpan ke orderData agar saat dilihat di history resinya tidak berubah-ubah)
    if (!orderData.resi) {
        orderData.resi = "ADNGRP" + Math.random().toString(36).substring(2, 10).toUpperCase();
        // Update data terakhir agar resi tersimpan
        localStorage.setItem('lastOrder', JSON.stringify(orderData)); 
    }
    document.getElementById('resi-number').innerText = orderData.resi;
    
    document.getElementById('customer-name').innerText = orderData.customer || '-';
    document.getElementById('customer-email').innerText = orderData.email || '-';
    document.getElementById('customer-phone').innerText = orderData.phone || '-';
    document.getElementById('shipping-address').innerText = orderData.address || '-';

    const courierName = orderData.courier || 'Standard';
    document.getElementById('display-courier').innerText = courierName.toUpperCase();
    const shippingFee = orderData.shippingFee || 0;
    document.getElementById('display-shipping-cost').innerText = `Rp ${shippingFee.toLocaleString('id-ID')}`;

    const container = document.getElementById('order-items');
    let subtotal = 0;

    container.innerHTML = orderData.items.map(item => {
        const price = typeof item.price === 'string' ? parseInt(item.price.replace(/[^0-9]/g, '')) : item.price;
        subtotal += (price * item.qty);
        
        return `
            <div class="flex gap-4 py-3 border-b border-stone-50 last:border-0">
                <div class="w-14 h-15 bg-stone-100 shrink-0">
                    <img src="${item.image || 'images/logo_aden_gold2.png'}" class="w-full h-full object-cover">
                </div>
                <div class="flex-grow">
                    <div class="flex justify-between items-start">
                        <h4 class="text-[12px] font-black text-stone-800 uppercase tracking-tight leading-tight">${item.name}</h4>
                        <p class="text-[12px] font-extrabold text-stone-800">Rp ${(price * item.qty).toLocaleString('id-ID')}</p>
                    </div>
                    <div class="mt-1 flex flex-wrap gap-x-1 gap-y-1">
                        <span class="text-[11px] text-stone-600 font-semibold">${item.color} |</span>
                        <span class="text-[11px] text-stone-600 font-semibold"> ${item.size} |</span>
                        <span class="text-[11px] text-stone-600 font-semibold">Qty ${item.qty}</span>
                    </div>
                </div>
            </div>
        `;
    }).join('');

    document.getElementById('display-subtotal').innerText = `Rp ${subtotal.toLocaleString('id-ID')}`;
    document.getElementById('display-total').innerText = "Rp " + orderData.total.toLocaleString('id-ID');
}

    function clearAndGoHome() {
        localStorage.removeItem('myCart');
        localStorage.removeItem('paymentExpiry');
        window.location.href = 'index.html';
    }
    
    window.onload = renderReceipt;
</script>

</body>
</html>
